<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JSONPlaceholder Posts</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Post List</h1>

  <input
  type="text"

  <ul id="list"></ul>


  <script src="script.js"></script>
</body>
</html>
